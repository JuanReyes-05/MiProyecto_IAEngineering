version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: helpdesk_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chroma_data:/app/data/chroma_db
      - ./docs:/app/docs:ro
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - helpdesk_net

  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: helpdesk_ui
    restart: unless-stopped
    command: ["streamlit", "run", "scripts/ui.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - helpdesk_net

volumes:
  chroma_data:
  logs_data:

networks:
  helpdesk_net:
    driver: bridge
